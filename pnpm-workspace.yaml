allowBuilds:
  sharp: true
  unrs-resolver: true
minimumReleaseAge: 4320 # 3 days in minutes
trustPolicy: no-downgrade
trustPolicyExclude:
  - undici-types@6.21.0
  - eslint-import-resolver-typescript@3.10.1
  - semver@6.3.1

# This is required for varlock's integration with Next.js
packages:
  - .
overrides:
  "@next/env": "npm:@varlock/nextjs-integration"
